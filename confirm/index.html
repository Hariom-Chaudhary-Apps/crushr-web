<!DOCTYPE html>
<html>
<head>
  <title>Email Confirmed — Crushr</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<script>
  const hash = window.location.hash.substring(1);
  const query = window.location.search.substring(1);
  const params = new URLSearchParams(hash || query);
  const type = params.get('type');
  if (type === 'signup' || type === 'email_change') {
    document.title = 'Email Confirmed!';
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #fafafa; padding: 24px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 24px; padding: 48px 32px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 4px 40px rgba(232,67,147,0.08); }
  h1 { font-size: 36px; color: #E84393; font-family: Georgia, serif; margin-bottom: 4px; }
  .tagline { font-size: 10px; color: #bbb; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 32px; }
  .check { width: 64px; height: 64px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  h2 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 8px; }
  p { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 28px; }
  .btn { display: block; background: #E84393; color: #fff; text-decoration: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; }
</style>
<div class="card">
  <h1>Crushr</h1>
  <p class="tagline">Find your crush</p>
  <div class="check">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h2>Email Confirmed!</h2>
  <p>Your account is ready. Open the Crushr app and log in to start finding your crush.</p>
  <a href="com.datingapp.crushr://crushr.in" class="btn">Open Crushr App</a>
</div>
</body>
</html>
