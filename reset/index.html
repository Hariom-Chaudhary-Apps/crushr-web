<!DOCTYPE html>
<html>
<head>
  <title>Reset Password — Crushr</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
    .card { width: 100%; max-width: 400px; text-align: center; }
    h1 { color: #E84393; font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .tagline { color: #ccc; font-size: 11px; letter-spacing: 3px; margin-bottom: 32px; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #111; }
    p { color: #999; font-size: 14px; margin-bottom: 24px; }
    input { width: 100%; padding: 14px 16px; border: 1.5px solid #eee; border-radius: 12px; font-size: 15px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #E84393; }
    button { width: 100%; padding: 14px; background: #E84393; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:disabled { background: #f0a0c8; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 14px; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
<div class="card">
  <h1>Crushr</h1>
  <p class="tagline">FIND YOUR CRUSH</p>
  <h2>Reset your password</h2>
  <p>Enter your new password below.</p>
  <input type="password" id="password" placeholder="New password" />
  <input type="password" id="confirm" placeholder="Confirm new password" />
  <button id="btn" onclick="resetPassword()">Update Password</button>
  <div class="msg" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const client = createClient(
    'https://niyxpvmvedwbytmzjwjf.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5peXhwdm12ZWR3Ynl0bXpqd2pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjQ3OTUsImV4cCI6MjA4OTQwMDc5NX0.IpxVPMRRJBGQi850oqzXQK2mcV-G3_KLmEw3S3lY86Y'
  );

  async function initSession() {
    const hash = window.location.hash.substring(1);
    const query = window.location.search.substring(1);
    const params = new URLSearchParams(hash || query);
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    const code = params.get('code');
    if (access_token) {
      await client.auth.setSession({ access_token, refresh_token });
    } else if (code) {
      await client.auth.exchangeCodeForSession(code);
    }
  }

  initSession();

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');

    if (password.length < 6) {
      msg.className = 'msg error';
      msg.textContent = 'Password must be at least 6 characters.';
      return;
    }
    if (password !== confirm) {
      msg.className = 'msg error';
      msg.textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await client.auth.updateUser({ password });

    if (error) {
      msg.className = 'msg error';
      msg.textContent = 'Error: ' + error.message;
      btn.disabled = false;
      btn.textContent = 'Update Password';
    } else {
      msg.className = 'msg success';
      msg.textContent = 'Password updated! Open the Crushr app and Log In.';
      btn.textContent = 'Done!';
    }
  }
</script>
</body>
</html>
