<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Crushr</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #E84393;
      --pink-dark: #c2306e;
      --black: #0f0f0f;
      --gray: #6b7280;
      --border: #e5e7eb;
      --success: #16a34a;
      --error: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #fce8f3 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 40px rgba(232,67,147,0.08), 0 1px 4px rgba(0,0,0,0.04);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: var(--pink);
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .brand-tagline {
      font-size: 10px;
      color: #bbb;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--pink);
      margin: 20px auto 0;
      border-radius: 2px;
      opacity: 0.4;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--black);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 13px 46px 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--black);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--pink); }

    .toggle-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #bbb;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .toggle-eye:hover { color: var(--pink); }
    .toggle-eye svg { width: 18px; height: 18px; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn-primary:hover { background: var(--pink-dark); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { background: #f0a0c8; cursor: not-allowed; transform: none; }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--black);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 10px;
      display: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-secondary:hover { border-color: var(--pink); color: var(--pink); }

    .msg {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      line-height: 1.5;
      min-height: 20px;
    }

    .msg.error { color: var(--error); }
    .msg.success { color: var(--success); font-weight: 500; }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-name">Crushr</div>
    <div class="brand-tagline">Find your crush</div>
    <div class="divider"></div>
  </div>

  <h2>Reset your password</h2>
  <p class="subtitle">Choose a new password for your account.</p>

  <div class="field">
    <label>New Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter new password" />
      <span class="toggle-eye" onclick="toggleEye('password', this)">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Confirm new password" />
      <span class="toggle-eye" onclick="toggleEye('confirm', this)">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        </svg>
      </span>
    </div>
  </div>

  <button class="btn-primary" id="btn" onclick="resetPassword()">Update Password</button>
  <div class="msg" id="msg"></div>
  <button class="btn-secondary" id="openBtn" onclick="openApp()">Open Crushr App</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const client = createClient(
    'https://niyxpvmvedwbytmzjwjf.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5peXhwdm12ZWR3Ynl0bXpqd2pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjQ3OTUsImV4cCI6MjA4OTQwMDc5NX0.IpxVPMRRJBGQi850oqzXQK2mcV-G3_KLmEw3S3lY86Y'
  );

  async function initSession() {
    const hash = window.location.hash.substring(1);
    const query = window.location.search.substring(1);
    const params = new URLSearchParams(hash || query);
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    const code = params.get('code');
    if (access_token) {
      await client.auth.setSession({ access_token, refresh_token });
    } else if (code) {
      await client.auth.exchangeCodeForSession(code);
    }
  }
  initSession();

  const eyeOff = `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
  const eyeOn  = `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;

  function toggleEye(fieldId, el) {
    const input = document.getElementById(fieldId);
    const svg = el.querySelector('svg');
    if (input.type === 'password') {
      input.type = 'text';
      svg.innerHTML = eyeOn;  // password visible → show open eye
    } else {
      input.type = 'password';
      svg.innerHTML = eyeOff; // password hidden → show crossed eye
    }
  }

  function openApp() {
    window.location.href = 'com.datingapp.crushr://crushr.in';
  }

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');

    if (password.length < 6) {
      msg.className = 'msg error';
      msg.textContent = 'Password must be at least 6 characters.';
      return;
    }
    if (password !== confirm) {
      msg.className = 'msg error';
      msg.textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';
    msg.className = 'msg';
    msg.textContent = '';

    const { error } = await client.auth.updateUser({ password });

    if (error) {
      msg.className = 'msg error';
      msg.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Update Password';
    } else {
      btn.textContent = 'Password Updated';
      msg.className = 'msg success';
      msg.textContent = 'Your password has been updated successfully.';
      document.getElementById('openBtn').style.display = 'block';
    }
  }
</script>
</body>
</html>
