<!DOCTYPE html>
<html>
<head>
  <title>Reset Password — Crushr</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 60px 24px; background: #fff; }
    h1 { color: #E84393; font-size: 28px; margin-bottom: 8px; }
    p { color: #999; font-size: 14px; margin-bottom: 32px; }
    a.btn {
      display: inline-block;
      background: #E84393;
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
    }
    .error { color: #f00; }
  </style>
</head>
<body>
<script>
  const hash = window.location.hash;
  if (!hash) {
    document.write('<p class="error">Invalid or expired link. Please request a new one in the Crushr app.</p>');
  }
</script>
<h1>Crushr</h1>
<p>Tap the button below to reset your password in the app.</p>
<a id="openBtn" class="btn">Open Crushr App</a>
<script>
  const hash = window.location.hash;
  document.getElementById('openBtn').href = 'com.datingapp.crushr://crushr.in/updatePasswordScreen' + hash;
</script>
</body>
</html>
