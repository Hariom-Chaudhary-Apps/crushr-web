<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Reset Password — Crushr</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #E84393;
      --pink-dark: #c2306e;
      --pink-bg: #fce8f3;
      --black: #0f0f0f;
      --gray: #6b7280;
      --border: #e5e7eb;
      --success: #16a34a;
      --error: #dc2626;
      --radius: clamp(12px, 3vw, 16px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f4f8;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 5vw, 40px);
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 100% 50% at 50% 0%, #fce8f3 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: clamp(16px, 4vw, 28px);
      padding: clamp(28px, 6vw, 52px) clamp(20px, 6vw, 44px);
      width: 100%;
      max-width: 460px;
      box-shadow:
        0 2px 8px rgba(232,67,147,0.06),
        0 8px 40px rgba(0,0,0,0.07);
      animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: clamp(24px, 5vw, 36px);
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 8vw, 40px);
      color: var(--pink);
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 5px;
    }

    .brand-tagline {
      font-size: clamp(9px, 2.5vw, 11px);
      color: #bbb;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .brand-line {
      width: 36px;
      height: 2px;
      background: var(--pink);
      margin: clamp(14px, 3vw, 20px) auto 0;
      border-radius: 2px;
      opacity: 0.35;
    }

    /* Heading */
    h2 {
      font-size: clamp(17px, 4.5vw, 21px);
      font-weight: 600;
      color: var(--black);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: clamp(13px, 3.5vw, 14px);
      color: var(--gray);
      margin-bottom: clamp(20px, 5vw, 28px);
      line-height: 1.55;
    }

    /* Fields */
    .field {
      margin-bottom: clamp(10px, 3vw, 14px);
    }

    label {
      display: block;
      font-size: clamp(10px, 2.8vw, 12px);
      font-weight: 600;
      color: var(--black);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: clamp(6px, 2vw, 9px);
    }

    .input-wrap { position: relative; }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: clamp(12px, 3.5vw, 14px) clamp(42px, 10vw, 48px) clamp(12px, 3.5vw, 14px) clamp(14px, 4vw, 17px);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: clamp(14px, 4vw, 15px);
      font-family: 'DM Sans', sans-serif;
      color: var(--black);
      background: #fff;
      outline: none;
      transition: border-color 0.18s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus { border-color: var(--pink); }

    .toggle-eye {
      position: absolute;
      right: clamp(12px, 3.5vw, 15px);
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #bbb;
      display: flex;
      align-items: center;
      padding: 4px;
      transition: color 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle-eye:hover { color: var(--pink); }

    .toggle-eye svg {
      width: clamp(16px, 4.5vw, 19px);
      height: clamp(16px, 4.5vw, 19px);
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: clamp(13px, 3.8vw, 15px);
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: clamp(14px, 4vw, 15px);
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: clamp(6px, 2vw, 10px);
      transition: background 0.18s, transform 0.1s, opacity 0.18s;
      letter-spacing: 0.2px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary:hover:not(:disabled) { background: var(--pink-dark); }
    .btn-primary:active:not(:disabled) { transform: scale(0.985); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: clamp(12px, 3.5vw, 14px);
      background: transparent;
      color: var(--black);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: clamp(14px, 4vw, 15px);
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: clamp(8px, 2.5vw, 12px);
      display: none;
      transition: border-color 0.18s, color 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-secondary:hover { border-color: var(--pink); color: var(--pink); }

    /* Messages */
    .msg {
      margin-top: clamp(10px, 3vw, 14px);
      font-size: clamp(12px, 3.5vw, 13px);
      text-align: center;
      line-height: 1.5;
      min-height: 18px;
    }

    .msg.error { color: var(--error); }
    .msg.success { color: var(--success); font-weight: 500; }

    /* Tablet / desktop: slightly more breathing room */
    @media (min-width: 540px) {
      body { background: #ededf2; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-name">Crushr</div>
    <div class="brand-tagline">Find your crush</div>
    <div class="brand-line"></div>
  </div>

  <h2>Reset your password</h2>
  <p class="subtitle">Choose a new password for your account.</p>

  <div class="field">
    <label>New Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter new password" autocomplete="new-password"/>
      <span class="toggle-eye" onclick="toggleEye('password', this)">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Confirm new password" autocomplete="new-password"/>
      <span class="toggle-eye" onclick="toggleEye('confirm', this)">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        </svg>
      </span>
    </div>
  </div>

  <button class="btn-primary" id="btn" onclick="resetPassword()">Update Password</button>
  <div class="msg" id="msg"></div>
  <button class="btn-secondary" id="openBtn" onclick="openApp()">Open Crushr App</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const client = createClient(
    'https://niyxpvmvedwbytmzjwjf.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5peXhwdm12ZWR3Ynl0bXpqd2pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjQ3OTUsImV4cCI6MjA4OTQwMDc5NX0.IpxVPMRRJBGQi850oqzXQK2mcV-G3_KLmEw3S3lY86Y'
  );

  async function initSession() {
    const hash = window.location.hash.substring(1);
    const query = window.location.search.substring(1);
    const params = new URLSearchParams(hash || query);
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    const code = params.get('code');
    if (access_token) {
      await client.auth.setSession({ access_token, refresh_token });
    } else if (code) {
      await client.auth.exchangeCodeForSession(code);
    }
  }
  initSession();

  const eyeOff = `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
  const eyeOn  = `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;

  function toggleEye(fieldId, el) {
    const input = document.getElementById(fieldId);
    const svg = el.querySelector('svg');
    if (input.type === 'password') {
      input.type = 'text';
      svg.innerHTML = eyeOn;
    } else {
      input.type = 'password';
      svg.innerHTML = eyeOff;
    }
  }

  function openApp() {
    window.location.href = 'com.datingapp.crushr://crushr.in';
  }

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');

    if (password.length < 6) {
      msg.className = 'msg error';
      msg.textContent = 'Password must be at least 6 characters.';
      return;
    }
    if (password !== confirm) {
      msg.className = 'msg error';
      msg.textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';
    msg.className = 'msg';
    msg.textContent = '';

    const { error } = await client.auth.updateUser({ password });

    if (error) {
      msg.className = 'msg error';
      msg.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Update Password';
    } else {
      btn.textContent = 'Password Updated';
      msg.className = 'msg success';
      msg.textContent = 'Your password has been updated successfully.';
      document.getElementById('openBtn').style.display = 'block';
    }
  }
</script>
</body>
</html>
